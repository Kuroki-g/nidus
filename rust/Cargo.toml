[workspace]
members = [
    "crates/nidus-core",
    "crates/nidus-cli",
]
resolver = "2"

[workspace.dependencies]
tokio       = { version = "1", features = ["full"] }
lancedb     = "0.26"
arrow-array = "57"
arrow-schema = "57"
safetensors = "0.4"
tokenizers  = { version = "0.21", default-features = false, features = ["onig"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
anyhow      = "1"
clap        = { version = "4", features = ["derive"] }
dotenvy     = "0.15"
dirs        = "5"
