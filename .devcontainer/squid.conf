http_port 3128

access_log /var/log/squid/access.log
emulate_httpd_log on
debug_options ALL,1 11,3 33,2 14,3 17,3

# --- ACL定義 ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# internalネットワーク全体を許可対象に
acl internal_net src 172.16.0.0/12

acl allowed_domains dstdomain \
    .anthropic.com \
    platform.claude.com \
    code.claude.com \
    claude.ai \
    .github.com \
    .githubusercontent.com \
    .pypi.org \
    .pythonhosted.org \
    .huggingface.co \
    docs.rs \
    docs.python.org \
    docs.astral.sh \
    docs.pydantic.dev \
    modelcontextprotocol.io \
    .qiita.com \
    .zenn.dev

# 安全でないポートは拒否
http_access deny !Safe_ports
# CONNECTは443
http_access deny CONNECT !SSL_ports

# Allow whitelist domain
# internal_netからのCONNECT（HTTPS）をallowed_domainsのみ許可
http_access allow CONNECT internal_net allowed_domains

# Block others
http_access deny all

# --- その他 ---
# Disable cache
cache deny all

# Exclude proxy information
forwarded_for off
via off
