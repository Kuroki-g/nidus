services:
  http-proxy:
    image: ubuntu/squid:6.13-25.04_beta
    restart: unless-stopped
    command: ["squid", "-N"]
    ports:
      - "3128:3128"

    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - squid-logs:/var/log/squid

    networks:
      - internal
      - external

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/3128' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: vscode
        UID: "1000"
        GID: "1000"
    container_name: claude-dev
    depends_on:
      http-proxy:
        condition: service_healthy

    networks:
      # only internal
      - internal

    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      # squid
      - http_proxy=http://http-proxy:3128
      - https_proxy=http://http-proxy:3128
      - HTTP_PROXY=http://http-proxy:3128
      - HTTPS_PROXY=http://http-proxy:3128
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
      # Python
      - PYTHONUNBUFFERED=1
      - TERM=xterm-256color

    volumes:
      - ..:/workspace:cached
      - ${HOME}/.claude:/home/vscode/.claude
      - ${HOME}/.claude.json:/home/vscode/.claude.json
      - /etc/localtime:/etc/localtime:ro

    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    tmpfs:
      - /tmp:size=256m,mode=1777

    stdin_open: true
    tty: true
    working_dir: /workspace

  squid-log:
    image: busybox:1.37-musl
    restart: unless-stopped
    command: ["tail", "-F", "/var/log/squid/access.log"]
    volumes:
      - squid-logs:/var/log/squid:ro
    depends_on:
      http-proxy:
        condition: service_healthy

networks:
  internal: # cannot access internet directly
    internal: true
  external: # can access internet
    driver: bridge

volumes:
  squid-logs:
