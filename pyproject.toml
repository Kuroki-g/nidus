[project]
name = "nidus-mcp"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pydantic>=2.12.5",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "packages/mcp-server",
    "packages/init-scripts",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "mcp-server",
    "init-scripts",
]

[project.scripts]
serve = "mcp_server.main:main"

[tool.uv.sources]
mcp-server = { workspace = true }
init-scripts = { workspace = true }
