[project]
name = "nidus-mcp"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pydantic>=2.12.5",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "packages/mcp-server",
    "packages/init-scripts",
]

[dependency-groups]
dev = [
    "sentence-transformers>=3.3.1",
    "torch",
    "lancedb>=0.29.2",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "mcp-server",
    "init-scripts",
]

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cpu"

[project.scripts]
serve = "mcp_server.main:main"
init = "init_scripts:main"

[tool.uv.sources]
torch = { index = "pytorch" }
mcp-server = { workspace = true }
init-scripts = { workspace = true }
