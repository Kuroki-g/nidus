[project]
name = "cli"
version = "0.1.0"
description = "Nidus CLI"
requires-python = "==3.14.*"
dependencies = [
    "common",
    "mistune",
    "pypdf",
    "pdfminer-six",
    "click",
    "watchdog",
    "lancedb",
    "pyarrow",
    "numpy",
    "pydantic-settings",
    "huggingface-hub",
    "mcp",
    "mammoth>=1.11.0",
]

[project.scripts]
nidus = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
common = { workspace = true }
