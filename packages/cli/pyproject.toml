[project]
name = "cli"
version = "0.1.0"
description = "Nidus CLI"
requires-python = "==3.14.*"
dependencies = [
    "common",
    "mistune>=3.2.0",
    "pypdf>=6.7.1",
    "pdfminer-six>=20260107",
    "click>=8.3.1",
    "watchdog>=6.0.0",
]

[project.scripts]
nidus = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
common = { workspace = true }
