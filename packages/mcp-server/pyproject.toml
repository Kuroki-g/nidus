[project]
name = "mcp-server"
version = "0.1.0"
description = "Nidus MCP server"
requires-python = "==3.14.*"
dependencies = [
    "common",
    "cli",
    "mcp",
]

[project.scripts]
serve = "mcp-server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
common = { workspace = true }
cli = { workspace = true }
